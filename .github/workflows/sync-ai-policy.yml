name: Sync Class C AI policy

on:
  push:
    branches: [main]
    paths:
      - AI-Policies/AI_POLICY-c.md
      - .github/workflows/sync-ai-policy.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  SOURCE_FILE: AI-Policies/AI_POLICY-c.md
  DEST_FILE: AI-USAGE-POLICY.md

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one repo failing must not block the others
      matrix:
        repo:
          - registry
          - opentofu.org
          - opentofu-performance-testing
          - registry-ui
          - opentofu-mcp-server
          - tofudl
    steps:
      - name: Check out this repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: source

      - name: Check out target repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: opentofu/${{ matrix.repo }}
          token: ${{ secrets.GH_PAT }}
          path: target
          fetch-depth: 1
          sparse-checkout: AI-USAGE-POLICY.md
          sparse-checkout-cone-mode: false

      - name: Copy policy into target
        run: cp "source/$SOURCE_FILE" "target/$DEST_FILE"

      - name: Commit and open / update PR
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: opentofu/${{ matrix.repo }}
          BRANCH: ai-usage-policy-sync
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain -- "$DEST_FILE")" ]; then
            echo "Policy already up to date in $REPO; nothing to sync."
            exit 0
          fi

          base="$(git rev-parse --abbrev-ref HEAD)"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git switch -C "$BRANCH"
          git add "$DEST_FILE"
          git commit -m "sync AI usage policy from opentofu/org"
          git push --force origin "$BRANCH"

          # Open a PR only if one isn't already open for this branch; otherwise the
          # force-push above has already updated the existing PR.
          if [ -n "$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "PR already open for $BRANCH; force-push updated it."
            exit 0
          fi

          gh pr create --repo "$REPO" --base "$base" --head "$BRANCH" \
            --title "[Org] Sync AI usage policy" \
            --body "Propagates the OpenTofu Class C AI usage policy from [opentofu/org](https://github.com/opentofu/org/blob/main/AI-Policies/AI_POLICY-c.md), the single source of truth.

          Opened automatically. To change the policy, edit it in \`opentofu/org\` — do not edit this file directly, as it will be overwritten on the next sync."
